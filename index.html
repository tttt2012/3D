html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive 3D Photo</title>
    <!-- Import Google's 3D viewer element -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; }
        model-viewer { width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <!-- This element embeds your 3D file seamlessly -->
    <model-viewer src="Dog.glb" 
                  camera-controls 
                  touch-action="pan-y" 
                  auto-rotate 
                  shadow-intensity="1">
    </model-viewer>

</body>
</html>
