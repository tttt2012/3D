<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toby's 3D gallery</title>
  <!-- Load Google's 3D Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      background-color: #121212; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
    }

    /* Main Container */
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: column-reverse; /* List at bottom on mobile */
    }

    /* Display Area */
    .viewer-box {
      flex: 1;
      position: relative;
      background-color: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    model-viewer {
      width: 100%;
      height: 100%;
      display: none;
    }

    /* 2D Image Display */
    #image-viewer {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    /* Sidebar Container */
    .gallery-sidebar {
      width: 100%;
      max-height: 240px;
      overflow-y: auto;
      background-color: #181818;
      border-top: 1px solid #2a2a2a;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Page Title */
    .gallery-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #3b82f6;
      letter-spacing: -0.02em;
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    /* Item Card */
    .card {
      background-color: #262626;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s, border-color 0.2s;
      border: 2px solid transparent;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card:hover { background-color: #333333; }
    .card.active { border-color: #3b82f6; background-color: #1e293b; }

    .card h4 {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      word-break: break-word;
    }

    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .badge-3d { background-color: #2563eb; color: #fff; }
    .badge-img { background-color: #059669; color: #fff; }

    /* Loading Status */
    .status-msg {
      font-size: 0.9rem;
      color: #a1a1aa;
    }

    /* Desktop Layout */
    @media (min-width: 768px) {
      .container { flex-direction: row; }
      .gallery-sidebar {
        width: 300px;
        max-height: 100%;
        border-top: none;
        border-right: 1px solid #2a2a2a;
      }
      .gallery-grid {
        display: flex;
        flex-direction: column;
      }
      .card {
        flex-direction: row;
        justify-content: space-between;
        text-align: left;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Sidebar / Selection Menu -->
    <div class="gallery-sidebar">
      <h1 class="gallery-title">Toby's 3D gallery</h1>
      <div id="status" class="status-msg">Scanning 3D/ folder...</div>
      <div class="gallery-grid" id="gallery"></div>
    </div>

    <!-- Interactive Viewport -->
    <div class="viewer-box">
      <!-- 3D Model Display -->
      <model-viewer 
        id="model-viewer"
        src="" 
        alt="3D Model" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1" 
        ar>
      </model-viewer>

      <!-- 2D Image Display -->
      <img id="image-viewer" src="" alt="Photo" />
    </div>
  </div>

  <script>
    // Automatically detect GitHub username & repository name from GitHub Pages URL
    // Hardcoded repository details for tttt2012.github.io/3D
const userName = 'tttt2012';
const repoName = '3D';

// Target the root of the repository where index.html and all files sit
const apiUrl = `https://api.github.com/repos/${userName}/${repoName}/contents/`;

const galleryContainer = document.getElementById("gallery");
const statusMsg = document.getElementById("status");
const modelViewer = document.getElementById("model-viewer");
const imageViewer = document.getElementById("image-viewer");

// Display selected item in viewport
function displayMedia(item) {
  if (item.type === "3d") {
    imageViewer.style.display = "none";
    modelViewer.src = item.file;
    modelViewer.style.display = "block";
  } else {
    modelViewer.style.display = "none";
    imageViewer.src = item.file;
    imageViewer.style.display = "block";
  }
}

// Convert "my_carina_scan.glb" -> "my carina scan"
function cleanTitle(filename) {
  const nameWithoutExt = filename.substring(0, filename.lastIndexOf('.'));
  return nameWithoutExt.replace(/[-_]/g, ' ');
}

// Render cards into the left sidebar
function renderCards(mediaList) {
  galleryContainer.innerHTML = "";
  statusMsg.style.display = "none";
  
  // Auto-display the first file in the list
  displayMedia(mediaList[0]);

  mediaList.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = `card ${index === 0 ? 'active' : ''}`;
    
    const badgeClass = item.type === '3d' ? 'badge-3d' : 'badge-img';
    const badgeText = item.type === '3d' ? '3D' : 'PHOTO';

    card.innerHTML = `
      <h4>${item.title}</h4>
      <span class="badge ${badgeClass}">${badgeText}</span>
    `;

    card.addEventListener("click", () => {
      document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");
      displayMedia(item);
    });

    galleryContainer.appendChild(card);
  });
}

// Fetch files dynamically from GitHub API
async function loadGallery() {
  try {
    const response = await fetch(apiUrl);
    
    if (!response.ok) {
      throw new Error(`GitHub API Error: ${response.status}. Ensure the repo '3D' is Public.`);
    }

    const files = await response.json();
    const mediaList = [];

    files.forEach(file => {
      const ext = file.name.split('.').pop().toLowerCase();
      
      // Collect .glb models and 2D images (ignoring index.html or other code files)
      if (ext === 'glb') {
        mediaList.push({ title: cleanTitle(file.name), file: file.name, type: '3d' });
      } else if (['jpg', 'jpeg', 'png', 'webp', 'gif'].includes(ext)) {
        mediaList.push({ title: cleanTitle(file.name), file: file.name, type: 'image' });
      }
    });

    if (mediaList.length === 0) {
      statusMsg.textContent = "No .glb or image files found in this repository.";
      return;
    }

    renderCards(mediaList);

  } catch (err) {
    statusMsg.textContent = err.message;
    console.error(err);
  }
}

loadGallery();
  </script>

</body>
</html>
