<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toby's 3D gallery</title>
  
  <!-- 1. Google 3D Model Viewer -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  
  <!-- 2. Pannellum 360 Photo Viewer (Lightweight CDN, no installation needed) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
      background-color: #121212; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #ffffff;
    }

    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
      flex-direction: column-reverse;
    }

    .viewer-box {
      flex: 1;
      position: relative;
      background-color: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Element Viewports */
    model-viewer, #panorama-viewer {
      width: 100%;
      height: 100%;
      display: none;
    }

    #image-viewer {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
    }

    /* Sidebar Styling */
    .gallery-sidebar {
      width: 100%;
      max-height: 240px;
      overflow-y: auto;
      background-color: #181818;
      border-top: 1px solid #2a2a2a;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gallery-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #3b82f6;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
    }

    .card {
      background-color: #262626;
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      text-align: center;
      transition: background-color 0.2s, border-color 0.2s;
      border: 2px solid transparent;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card:hover { background-color: #333333; }
    .card.active { border-color: #3b82f6; background-color: #1e293b; }

    .card h4 {
      font-size: 0.85rem;
      font-weight: 500;
      color: #e2e8f0;
      word-break: break-word;
    }

    /* Badges */
    .badge {
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: bold;
    }

    .badge-3d { background-color: #2563eb; color: #fff; }
    .badge-pano { background-color: #d97706; color: #fff; }
    .badge-img { background-color: #059669; color: #fff; }

    .status-msg { font-size: 0.9rem; color: #a1a1aa; }

    @media (min-width: 768px) {
      .container { flex-direction: row; }
      .gallery-sidebar {
        width: 300px;
        max-height: 100%;
        border-top: none;
        border-right: 1px solid #2a2a2a;
      }
      .gallery-grid { display: flex; flex-direction: column; }
      .card { flex-direction: row; justify-content: space-between; text-align: left; }
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Sidebar -->
    <div class="gallery-sidebar">
      <h1 class="gallery-title">Toby's 3D gallery</h1>
      <div id="status" class="status-msg">Scanning repository root...</div>
      <div class="gallery-grid" id="gallery"></div>
    </div>

    <!-- Viewport -->
    <div class="viewer-box">
      <model-viewer id="model-viewer" src="" alt="3D Model" camera-controls auto-rotate shadow-intensity="1" ar></model-viewer>
      <div id="panorama-viewer"></div>
      <img id="image-viewer" src="" alt="Photo" />
    </div>
  </div>

  <script>
    const userName = 'tttt2012';
    const repoName = '3D';
    const apiUrl = `https://api.github.com/repos/${userName}/${repoName}/contents/`;

    const galleryContainer = document.getElementById("gallery");
    const statusMsg = document.getElementById("status");
    const modelViewer = document.getElementById("model-viewer");
    const imageViewer = document.getElementById("image-viewer");
    const panoramaViewer = document.getElementById("panorama-viewer");

    let pViewerInstance = null; // Store active 360 panorama instance

    function hideAllViewers() {
      modelViewer.style.display = "none";
      imageViewer.style.display = "none";
      panoramaViewer.style.display = "none";
      
      // Clean up previous 360 viewer instance to free memory
      if (pViewerInstance) {
        pViewerInstance.destroy();
        pViewerInstance = null;
      }
    }

    function displayMedia(item) {
      hideAllViewers();

      if (item.type === "3d") {
        modelViewer.src = item.file;
        modelViewer.style.display = "block";
      } else if (item.type === "pano") {
        panoramaViewer.style.display = "block";
        pViewerInstance = pannellum.viewer('panorama-viewer', {
          "type": "equirectangular",
          "panorama": item.file,
          "autoLoad": true,
          "autoRotate": -2,
          "compass": true
        });
      } else {
        imageViewer.src = item.file;
        imageViewer.style.display = "block";
      }
    }

    function cleanTitle(filename) {
      const nameWithoutExt = filename.substring(0, filename.lastIndexOf('.'));
      return nameWithoutExt.replace(/[-_]/g, ' ');
    }

    function renderCards(mediaList) {
      galleryContainer.innerHTML = "";
      statusMsg.style.display = "none";
      displayMedia(mediaList[0]);

      mediaList.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = `card ${index === 0 ? 'active' : ''}`;
        
        let badgeClass = 'badge-img';
        let badgeText = 'PHOTO';

        if (item.type === '3d') { badgeClass = 'badge-3d'; badgeText = '3D'; }
        if (item.type === 'pano') { badgeClass = 'badge-pano'; badgeText = '360°'; }

        card.innerHTML = `
          <h4>${item.title}</h4>
          <span class="badge ${badgeClass}">${badgeText}</span>
        `;

        card.addEventListener("click", () => {
          document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
          card.classList.add("active");
          displayMedia(item);
        });

        galleryContainer.appendChild(card);
      });
    }

    async function loadGallery() {
      try {
        const response = await fetch(apiUrl);
        if (!response.ok) throw new Error(`GitHub API Error: ${response.status}`);

        const files = await response.json();
        const mediaList = [];

        files.forEach(file => {
          const ext = file.name.split('.').pop().toLowerCase();
          const name = file.name.toLowerCase();

          if (ext === 'glb') {
            mediaList.push({ title: cleanTitle(file.name), file: file.name, type: '3d' });
          } 
          // Detect 360 photo if filename contains "360", "pano", "p360", or "dji"
          else if (['jpg', 'jpeg', 'png', 'webp'].includes(ext)) {
            const isPano = name.includes('360') || name.includes('pano') || name.includes('p360') || name.includes('dji');
            mediaList.push({ 
              title: cleanTitle(file.name), 
              file: file.name, 
              type: isPano ? 'pano' : 'image' 
            });
          }
        });

        if (mediaList.length === 0) {
          statusMsg.textContent = "No supported files found.";
          return;
        }

        renderCards(mediaList);

      } catch (err) {
        statusMsg.textContent = err.message;
        console.error(err);
      }
    }

    loadGallery();
  </script>

</body>
</html>
