<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Photo Viewer</title>
  <!-- Load Google's 3D Model Viewer script -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background-color: #121212; }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>

  <!-- Replace 'my-scan.glb' with the exact filename of your uploaded 3D model -->
  <model-viewer 
    src="zako.glb" 
    alt="3D Scanned Photo" 
    camera-controls 
    auto-rotate 
    shadow-intensity="1" 
    ar>
  </model-viewer>

</body>
</html>
