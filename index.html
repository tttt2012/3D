<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Photo Gallery</title>
    <!-- Use jsDelivr to completely bypass Google's CORS blocking rule -->
    <script type="module" src="https://jsdelivr.net"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background-color: #1a1a1a; color: white; display: flex; flex-direction: column; }
        #viewer-container { width: 100%; height: 70vh; background-color: #111; position: relative; }
        model-viewer { width: 100%; height: 100%; display: block; }
        .gallery { height: 30vh; display: flex; justify-content: center; align-items: center; gap: 20px; background-color: #222; padding: 10px; box-sizing: border-box; }
        .thumb-box { text-align: center; }
        .thumbnail { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 2px solid #555; cursor: pointer; background-color: #333; display: block; }
        .thumbnail:hover { border-color: #00ffcc; }
    </style>
</head>
<body>

    <div id="viewer-container">
        <!-- Make sure src matches your file capitalization exactly -->
        <model-viewer id="mainViewer" src="zato.glb" camera-controls touch-action="pan-y" auto-rotate shadow-intensity="1"></model-viewer>
    </div>

    <div class="gallery">
        <div class="thumb-box">
            <img class="thumbnail" src="zato.png" onclick="switchModel('zato.glb')" alt="[Zato PNG]">
            <span style="font-size:12px; display:block; margin-top:5px;">Zato Model</span>
        </div>
        <div class="thumb-box">
            <img class="thumbnail" src="zako.png" onclick="switchModel('zako.glb')" alt="[Zako PNG]">
            <span style="font-size:12px; display:block; margin-top:5px;">Zako Model</span>
        </div>
    </div>

    <script>
        function switchModel(fileName) {
            console.log("Switching model to: " + fileName);
            document.getElementById('mainViewer').setAttribute('src', fileName);
        }
    </script>

</body>
</html>
